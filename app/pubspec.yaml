name: app
description: "Kaizen — planner for students. The important stuff won't slip."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Local DB (offline-first)
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0

  # Persistence / prefs
  shared_preferences: ^2.2.0

  # Fonts
  google_fonts: ^6.2.0

  # Internationalisation
  intl: ^0.19.0
  image_picker: ^1.2.2
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

name: app
description: "Kaizen — planner for students. The important stuff won't slip."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Local DB (offline-first)
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0

  # Persistence / prefs
  shared_preferences: ^2.2.0

  # Версия приложения (показывается в профиле)
  package_info_plus: ^8.0.0

  # Fonts
  google_fonts: ^6.2.0

  # Иконки Phosphor (Kaname redesign, Phase 1; используется начиная с Phase 2).
  # Вендорнуто локально (third_party/) и пропатчено: upstream 2.1.0 расширял
  # `IconData`, который во Flutter 3.44+ (Dart 3.9) стал final-классом → CFE-ошибка.
  # Патч делает иконки обычными IconData. См. third_party/phosphor_flutter/lib/src/phosphor_icon_data.dart
  phosphor_flutter:
    path: third_party/phosphor_flutter

  # Internationalisation
  intl: ^0.20.2
  image_picker: ^1.2.2
  path: ^1.9.0
  path_provider: ^2.1.0
  video_player: ^2.9.0
  # Сканер штрихкодов (Food, Ф1)
  mobile_scanner: ^7.1.0
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  speech_to_text: ^7.4.0
  file_picker: ^8.0.0
  usage_stats: ^2.0.1

  # Короткие звуковые эффекты в приложении (звук «задача выполнена»)
  audioplayers: ^6.0.0
  # Озвучка шагов медитации на устройстве (Phase 1 baseline, ADR-054).
  # Бесплатный системный TTS, без ключей и сети. Деградирует в no-op там,
  # где плагин недоступен (web/desktop) — сервис обёрнут в try/catch.
  flutter_tts: ^4.2.0

  # G1: шеринг карточки стрика (PNG-файл + текстовый fallback).
  # Поддерживает iOS, Android, web (Web Share API с clipboard-fallback).
  share_plus: ^10.0.0

  # E3: нативный запрос оценки приложения (App Store / Google Play).
  # На web и desktop isAvailable() возвращает false → тихий no-op.
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  generate: false

  assets:
    # PNG-кадры маскота Kai для нативного виджета (iOS WidgetKit + запасные копии).
    # Android читает из android/app/src/main/res/drawable-<density>/ напрямую.
    # Генерируются скриптом: flutter test test/generate_kai_assets_test.dart
    - assets/kai_widget/
    # Короткие звуки в приложении (звук «задача выполнена» — task_done.mp3).
    # Если файла ещё нет — сервис звука откатывается на системный клик.
    - assets/sounds/
    # Фоновый эмбиент для медитаций (синтезированный «коричневый шум»,
    # сгенерирован детерминированно — без лицензий). ADR-054 Phase 1.
    - assets/audio/

  fonts:
    # Локально вшитые шрифты для деванагари / японского / корейского.
    # Заменяют рантайм-загрузку через GoogleFonts — устраняют "вспышку квадратиков".
    - family: 'Noto Sans Devanagari'
      fonts:
        - asset: assets/fonts/NotoSansDevanagari.ttf
    - family: 'Noto Sans JP'
      fonts:
        - asset: assets/fonts/NotoSansJP.ttf
    - family: 'Noto Sans KR'
      fonts:
        - asset: assets/fonts/NotoSansKR.ttf

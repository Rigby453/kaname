openapi: 3.0.3
info:
  title: Kaizen API
  version: 0.1.0
  description: >
    REST API for Kaizen. Single source of truth for endpoints and schemas.
    Payloads use snake_case. All protected routes require a Bearer JWT.
    MVP scope = auth, items, streaks, sync, rule-based redistribute.
    AI endpoints are Phase 1 (premium) and are tagged accordingly.
servers:
  - url: http://localhost:3000
    description: Local dev
  - url: https://api.kaizen.com
    description: Production (placeholder)

tags:
  - name: Auth
  - name: Items
  - name: Streaks
  - name: Sync
  - name: Engine
  - name: AI (Phase 1)
  - name: Share
  - name: Subscription
  - name: Billing

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Auth]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409':
          description: Email or phone already exists
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get the current user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/items:
    get:
      tags: [Items]
      summary: List items in a date range
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date-time }
          description: Inclusive lower bound on scheduled_at
        - in: query
          name: to
          schema: { type: string, format: date-time }
          description: Inclusive upper bound on scheduled_at
      responses:
        '200':
          description: OK (empty array if none)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Item' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Items]
      summary: Create an item
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateItemRequest' }
      responses:
        '201':
          description: Created. If priority=main, is_protected is forced true.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Item' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/items/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Items]
      summary: Partially update an item (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateItemRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Item' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Items]
      summary: Delete an item (owner only)
      responses:
        '204': { description: Deleted (no body) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/streaks:
    get:
      tags: [Streaks]
      summary: Get the current user's streak (created with defaults if missing)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Streak' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/sync:
    post:
      tags: [Sync]
      summary: Offline-first sync (last-write-wins by updated_at)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SyncRequest' }
      responses:
        '200':
          description: Server-side changes the client does not yet have
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SyncResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/redistribute:
    post:
      tags: [Engine]
      summary: Rule-based redistribution proposal (free, MVP)
      description: >
        Returns a proposed plan only; nothing is saved. The client applies a
        chosen plan via PATCH /items/{id}. Protected (is_protected) items are
        never moved and appear in skipped.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_date]
              properties:
                target_date:
                  type: string
                  format: date
                  description: Day to redistribute pending items into (usually today)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RedistributeResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/ai/redistribute:
    post:
      tags: [AI (Phase 1)]
      summary: AI smart redistribution — 2-3 plan variants (premium, Sonnet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_date]
              properties:
                target_date: { type: string, format: date }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    maxItems: 3
                    items:
                      type: object
                      properties:
                        label: { type: string, example: Balanced day }
                        reason: { type: string }
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              id: { type: string, format: uuid }
                              scheduled_at: { type: string, format: date-time }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/ai/morning-message:
    post:
      tags: [AI (Phase 1)]
      summary: Tone-aware morning review message (premium, Haiku)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pending_count, tone]
              properties:
                pending_count: { type: integer }
                tone: { $ref: '#/components/schemas/Tone' }
                user_name: { type: string }
      responses:
        '200':
          description: 1-2 sentence message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/ai/food-recognize:
    post:
      tags: [AI (Phase 1)]
      summary: Identify food in a photo (premium, Haiku multimodal; max 3/day)
      description: Claude identifies the dish only; КБЖУ comes from the food DB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image_base64, media_type]
              properties:
                image_base64: { type: string }
                media_type: { type: string, enum: [image/jpeg, image/png] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  dish: { type: string }
                  portion_description: { type: string }
                  confidence: { type: number, minimum: 0, maximum: 1 }
                  products:
                    type: array
                    description: >
                      Top food-DB matches for the dish (nutrition per 100 g,
                      from Open Food Facts — never from the model). May be empty.
                    items: { $ref: '#/components/schemas/FoodProduct' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429':
          description: Daily food-recognition limit reached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/ai/wrapped-summary:
    post:
      tags: [AI (Phase 1)]
      summary: One-paragraph wrapped recap of a period (premium)
      description: >
        AI-05. The client computes all numbers from its local DB (code, never
        the model) and sends them; the model only writes a tone-aware
        paragraph (<60 words). On-demand instead of a Sunday cron+Batch
        (ADR-026).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [period_days, tasks_done, tasks_total, main_done, main_total, water_ml, tone]
              properties:
                period_days: { type: integer, minimum: 1, maximum: 366 }
                tasks_done: { type: integer }
                tasks_total: { type: integer }
                main_done: { type: integer }
                main_total: { type: integer }
                avg_mood: { type: number, nullable: true, minimum: 1, maximum: 5 }
                water_ml: { type: integer }
                top_issue: { type: string, nullable: true }
                tone: { $ref: '#/components/schemas/Tone' }
      responses:
        '200':
          description: One upbeat paragraph
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/ai/menu-build:
    post:
      tags: [AI (Phase 1)]
      summary: Compose a one-day menu from the user's own foods (premium)
      description: >
        AI-07, SPEC C5 "[Собрать ИИ]". The client sends its own candidate foods
        and recipes (names + per-100g numbers from the food DB) plus goals; the
        model only picks items and grams — it never outputs nutrition numbers.
        The client recomputes all totals locally (code, never the model).
        Nothing is saved server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [candidates, calorie_goal, protein_goal_g]
              properties:
                candidates:
                  type: array
                  minItems: 5
                  maxItems: 40
                  items:
                    type: object
                    required: [name, per_100g]
                    properties:
                      name: { type: string }
                      per_100g:
                        type: object
                        properties:
                          calories: { type: number, nullable: true }
                          protein: { type: number, nullable: true }
                          fat: { type: number, nullable: true }
                          carbs: { type: number, nullable: true }
                          sugar: { type: number, nullable: true }
                          fiber: { type: number, nullable: true }
                calorie_goal: { type: number, minimum: 800, maximum: 6000 }
                protein_goal_g: { type: number, minimum: 10, maximum: 400 }
                fat_goal_g:
                  type: number
                  minimum: 0
                  maximum: 400
                  description: >
                    Optional fat target (g). Hit within ±15%. Absent = fat not
                    targeted or validated (ADR-046). КБЖУ stays code-computed.
                carbs_goal_g:
                  type: number
                  minimum: 0
                  maximum: 1000
                  description: >
                    Optional carbohydrate target (g). Hit within ±15%. Absent =
                    carbs not targeted or validated (ADR-046).
                sugar_max_g:
                  type: number
                  minimum: 0
                  maximum: 500
                  description: >
                    Optional sugar cap (g). The day's sugar must stay at or below
                    this. Absent = sugar not capped (ADR-046).
                fiber_min_g:
                  type: number
                  minimum: 0
                  maximum: 200
                  description: >
                    Optional fiber minimum (g). The day's fiber must be at or above
                    this. Absent = fiber not enforced (ADR-046).
                meals:
                  type: array
                  minItems: 1
                  maxItems: 6
                  items: { type: string }
                  default: [breakfast, lunch, dinner]
                tone: { $ref: '#/components/schemas/Tone' }
                health_profile:
                  type: object
                  description: >
                    Optional free-text health notes used only to bias/filter candidate
                    selection. All sub-fields are optional strings (max 500 chars each).
                    Absent = unchanged behavior (backward compatible).
                    Not medical advice — numbers remain code-computed.
                  properties:
                    allergies:
                      type: string
                      maxLength: 500
                      description: Allergies or intolerances the model must avoid.
                    healing:
                      type: string
                      maxLength: 500
                      description: Free-text note about wound healing speed.
                    deficiencies:
                      type: string
                      maxLength: 500
                      description: Known vitamin or mineral deficiencies.
                food_prefs:
                  type: object
                  description: >
                    Optional food preferences used only to filter/bias candidate
                    selection. All sub-fields are optional. Absent = unchanged
                    behavior (backward compatible). Not medical/nutritional
                    prescription — all КБЖУ numbers remain code-computed (ADR-038).
                  properties:
                    diet:
                      type: string
                      maxLength: 300
                      description: >
                        Dietary pattern: none|vegetarian|vegan|pescatarian|
                        halal|kosher|keto|other. "none" or absent = no restriction.
                    goal:
                      type: string
                      maxLength: 300
                      description: >
                        Weight goal: lose|maintain|gain. Already reflected in
                        calorie_goal; included for contextual food biasing only.
                    dislikes:
                      type: string
                      maxLength: 300
                      description: Free-text list of foods or ingredients to avoid.
                    likes:
                      type: string
                      maxLength: 300
                      description: Free-text list of preferred foods (best-effort).
                    meals_per_day:
                      type: integer
                      minimum: 1
                      maximum: 8
                      description: >
                        Target number of meals per day. Informational — the
                        requested meals array remains the source of truth for
                        meal names and count.
      responses:
        '200':
          description: >
            Proposed menu (names + grams only), a one-sentence note, the
            server-computed daily totals, and an off_target flag. The model never
            outputs nutrition numbers — totals are computed by code from the
            candidate per-100g values (ADR-046). off_target=true means the menu
            still missed at least one provided target after the bounded 1-retry
            validation loop, so the client should warn the user.
          content:
            application/json:
              schema:
                type: object
                required: [meals, note, off_target, totals]
                properties:
                  meals:
                    type: array
                    items:
                      type: object
                      properties:
                        meal: { type: string }
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              name: { type: string }
                              grams: { type: number }
                  note: { type: string }
                  off_target:
                    type: boolean
                    description: >
                      true if the menu is still outside tolerance after the
                      bounded validation loop (max 1 retry). Code-computed.
                  totals:
                    type: object
                    description: >
                      Server-computed daily totals (grams × candidate per-100g).
                      Code-computed, never from the model.
                    properties:
                      calories: { type: number }
                      protein: { type: number }
                      fat: { type: number }
                      carbs: { type: number }
                      sugar: { type: number }
                      fiber: { type: number }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/ai/diary-insight:
    post:
      tags: [AI (Phase 1)]
      summary: Weekly diary insight from recent day logs (premium, Sonnet)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tone]
              properties:
                tone: { $ref: '#/components/schemas/Tone' }
      responses:
        '200':
          description: 2-3 sentence insight
          content:
            application/json:
              schema:
                type: object
                properties:
                  insight: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/ai/schedule-import:
    post:
      tags: [AI (Phase 1)]
      summary: Parse a timetable photo into schedule items (premium, Haiku multimodal)
      description: >
        Claude reads a photo of a timetable/schedule and returns structured items
        (title + scheduled_at) placed on target_date. The client confirms before
        saving (via POST /items). Premium only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image_base64, media_type, target_date]
              properties:
                image_base64: { type: string }
                media_type: { type: string, enum: [image/jpeg, image/png] }
                target_date:
                  type: string
                  format: date
                  description: Day to place the parsed items on
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        title: { type: string }
                        scheduled_at: { type: string, format: date-time }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/subscription/dev-upgrade:
    post:
      tags: [Subscription]
      summary: DEV ONLY — set the current user's subscription tier (non-production)
      description: >
        Flips subscription_tier without real payment so premium features (AI)
        can be tested before payments (RevenueCat, Phase 1) are integrated.
        Returns 404 when NODE_ENV=production.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                tier: { type: string, enum: [free, premium], default: premium }
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { description: Not available (production) }

  /api/v1/subscription/status:
    get:
      tags: [Subscription]
      summary: Get the current user's premium entitlement status (ADR-041)
      description: >
        Single source of truth for "am I premium?" — works regardless of
        the billing channel (Apple IAP / Google Play / RuStore / Stripe /
        YooKassa / dev-upgrade). Uses server-side resolveEntitlement:
        isPremium = subscriptionTier="premium" OR (premiumUntil != null AND
        premiumUntil > now). The app calls this on startup and after any
        purchase attempt.
      responses:
        '200':
          description: Entitlement status
          content:
            application/json:
              schema:
                type: object
                required: [is_premium]
                properties:
                  is_premium:
                    type: boolean
                    description: True if the user has an active premium subscription.
                  premium_until:
                    type: string
                    format: date-time
                    nullable: true
                    description: >
                      Expiry of the timed subscription (null for legacy
                      lifetime premium or if no subscription is active).
                  source:
                    type: string
                    nullable: true
                    enum: [apple, google, rustore, stripe, yookassa, dev, null]
                    description: Billing channel that granted premium.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/billing/webhook/apple:
    post:
      tags: [Billing]
      summary: Apple App Store webhook stub (ADR-041)
      description: >
        Stub webhook — sets premiumUntil / premiumSource for the user.
        Real implementation requires App Store Server Notifications V2 JWS
        signature verification (TODO when Apple Developer account is available).
        If BILLING_WEBHOOK_SECRET env is set, requires x-webhook-secret header.
      parameters:
        - in: header
          name: x-webhook-secret
          schema: { type: string }
          description: Required if BILLING_WEBHOOK_SECRET env is set.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BillingWebhookRequest' }
      responses:
        '200':
          description: Entitlement updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BillingWebhookResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/billing/webhook/google:
    post:
      tags: [Billing]
      summary: Google Play Billing webhook stub (ADR-041)
      description: >
        Stub webhook. Real implementation requires JWT verification with
        Google service account key (TODO).
        If BILLING_WEBHOOK_SECRET env is set, requires x-webhook-secret header.
      parameters:
        - in: header
          name: x-webhook-secret
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BillingWebhookRequest' }
      responses:
        '200':
          description: Entitlement updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BillingWebhookResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/billing/webhook/rustore:
    post:
      tags: [Billing]
      summary: RuStore Billing webhook stub (ADR-041)
      description: >
        Stub webhook. Real implementation requires HMAC verification with
        BILLING_RUSTORE_SECRET (TODO).
        If BILLING_WEBHOOK_SECRET env is set, requires x-webhook-secret header.
      parameters:
        - in: header
          name: x-webhook-secret
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BillingWebhookRequest' }
      responses:
        '200':
          description: Entitlement updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BillingWebhookResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/billing/webhook/stripe:
    post:
      tags: [Billing]
      summary: Stripe webhook stub (ADR-041)
      description: >
        Stub webhook. Real implementation requires Stripe-Signature header
        verification via stripe.webhooks.constructEvent (TODO when Stripe
        account is available).
        If BILLING_WEBHOOK_SECRET env is set, requires x-webhook-secret header.
      parameters:
        - in: header
          name: x-webhook-secret
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BillingWebhookRequest' }
      responses:
        '200':
          description: Entitlement updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BillingWebhookResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/billing/webhook/yookassa:
    post:
      tags: [Billing]
      summary: YooKassa webhook stub (ADR-041)
      description: >
        Stub webhook. Real implementation requires IP allowlist check +
        SHA-1 signature verification (TODO when YooKassa account is available).
        If BILLING_WEBHOOK_SECRET env is set, requires x-webhook-secret header.
      parameters:
        - in: header
          name: x-webhook-secret
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BillingWebhookRequest' }
      responses:
        '200':
          description: Entitlement updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BillingWebhookResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/share:
    post:
      tags: [Share]
      summary: Create a view-only share link for a date range (signed JWT, 7 days)
      description: >
        Generates a signed JWT (purpose=share, expiresIn=7d) and returns a public URL.
        No DB row is created. The link gives read-only access to the owner's items
        in [from, to). Phase 3 feature (ADR-030).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to]
              properties:
                from:
                  type: string
                  format: date-time
                  description: Inclusive lower bound (ISO 8601 with offset)
                to:
                  type: string
                  format: date-time
                  description: Exclusive upper bound (ISO 8601 with offset); must be after from; max 31 days range
      responses:
        '200':
          description: Share token and public URL
          content:
            application/json:
              schema:
                type: object
                required: [token, url]
                properties:
                  token: { type: string, description: Signed JWT }
                  url: { type: string, description: Public share URL }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /share/{token}:
    get:
      tags: [Share]
      summary: Public share page — HTML (browser) or JSON (app)
      description: >
        No authentication required. If Accept contains text/html, returns a self-contained
        HTML page with the owner's plan (dark Focus theme). Otherwise returns JSON.
        Returns 404 if the token is expired or invalid.
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Plan data (HTML or JSON depending on Accept header)
          content:
            text/html:
              schema: { type: string }
            application/json:
              schema: { $ref: '#/components/schemas/ShareResponse' }
        '404':
          description: Link expired or invalid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/share/{token}:
    get:
      tags: [Share]
      summary: Share plan — JSON only (for in-app "shared with me", Phase 3)
      description: >
        Same data as GET /share/{token} but always JSON, no HTML branch.
        No authentication required.
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Plan data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ShareResponse' }
        '404':
          description: Link expired or invalid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/v1/food/barcode/{code}:
    get:
      tags: [Food]
      summary: Look up a product by barcode (Open Food Facts; KБЖУ per 100g)
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FoodProduct' }
        '400': { description: Invalid barcode }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { description: Not found }
        '502': { description: Food database unavailable }

  /api/v1/food/search:
    get:
      tags: [Food]
      summary: Text search for products (Open Food Facts)
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Matching products
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items: { $ref: '#/components/schemas/FoodProduct' }
        '400': { description: Missing query }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '502': { description: Food database unavailable }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not allowed (e.g. free tier on a premium endpoint)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Not found (also returned for items owned by another user)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string, example: Email already exists }

    Tone:
      type: string
      enum: [gentle, harsh]

    RegisterRequest:
      type: object
      description: >-
        Provide exactly one identifier — email OR phone — plus password and name.
        Per RF law 406-FZ (RU audience): email registration accepts only Russian
        email providers (e.g. mail.ru, yandex.ru); foreign domains such as
        gmail.com are rejected with 400. phone is a Russian number in E.164 form.
      required: [password, name]
      properties:
        email: { type: string, format: email, description: 'Russian email provider only' }
        phone: { type: string, description: 'Russian phone, E.164: +7XXXXXXXXXX' }
        password: { type: string, minLength: 8 }
        name: { type: string }

    LoginRequest:
      type: object
      description: Provide exactly one identifier — email OR phone — plus password.
      required: [password]
      properties:
        email: { type: string, format: email }
        phone: { type: string, description: 'Russian phone, E.164: +7XXXXXXXXXX' }
        password: { type: string }

    AuthResponse:
      type: object
      required: [access_token, user]
      properties:
        access_token: { type: string, description: JWT, 30d expiry }
        user: { $ref: '#/components/schemas/User' }

    User:
      type: object
      description: passwordHash is never returned
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true, description: 'Russian phone, E.164: +7XXXXXXXXXX' }
        name: { type: string }
        subscription_tier: { type: string, enum: [free, premium] }
        is_premium:
          type: boolean
          description: >
            Resolved entitlement (ADR-041): true if subscriptionTier="premium"
            (legacy) OR (premiumUntil is set AND premiumUntil > now).
        premium_until:
          type: string
          format: date-time
          nullable: true
          description: Expiry of the timed subscription; null for legacy lifetime or no subscription.
        premium_source:
          type: string
          nullable: true
          enum: [apple, google, rustore, stripe, yookassa, dev, null]
          description: Billing channel that granted premium.
        theme: { type: string, enum: [focus, calm, black, white, contrast] }
        tone_preference: { $ref: '#/components/schemas/Tone' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    BillingWebhookRequest:
      type: object
      required: [user_id, expires_at]
      description: >
        Stub payload accepted by all billing webhook endpoints (ADR-041).
        In real integrations the provider sends its own envelope; this stub
        provides a uniform dev/test surface. All fields are snake_case.
      properties:
        user_id:
          type: string
          description: The Kaizen user ID to update (uuid).
        product_id:
          type: string
          description: Optional SKU / product identifier for logging.
        expires_at:
          type: string
          format: date-time
          description: ISO 8601 expiry timestamp for the subscription.

    BillingWebhookResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, example: true }

    Item:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        title: { type: string }
        type: { type: string, enum: [task, event, exam, deadline] }
        priority: { type: string, enum: [low, medium, high, main] }
        status: { type: string, enum: [pending, done, skipped] }
        scheduled_at: { type: string, format: date-time }
        duration_minutes: { type: integer, default: 30 }
        is_protected: { type: boolean }
        recurrence_rule: { type: string, nullable: true, description: iCal RRULE }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateItemRequest:
      type: object
      required: [title, type, scheduled_at]
      properties:
        title: { type: string }
        type: { type: string, enum: [task, event, exam, deadline] }
        priority: { type: string, enum: [low, medium, high, main], default: medium }
        scheduled_at: { type: string, format: date-time }
        duration_minutes: { type: integer, default: 30 }
        is_protected: { type: boolean }
        recurrence_rule: { type: string, nullable: true }

    UpdateItemRequest:
      type: object
      description: All fields optional; only present fields are updated.
      properties:
        title: { type: string }
        type: { type: string, enum: [task, event, exam, deadline] }
        priority: { type: string, enum: [low, medium, high, main] }
        status: { type: string, enum: [pending, done, skipped] }
        scheduled_at: { type: string, format: date-time }
        duration_minutes: { type: integer }
        is_protected: { type: boolean }
        recurrence_rule: { type: string, nullable: true }

    Streak:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        current: { type: integer }
        longest: { type: integer }
        last_completed_date: { type: string, format: date, nullable: true }
        freeze_count: { type: integer }
        last_freeze_accrual_at: { type: string, format: date-time, nullable: true, description: "LWW cursor for freeze accrual sync (ADR-044); null if never accrued on server." }

    WaterLog:
      type: object
      description: A single water intake event (append-only).
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        amount_ml: { type: integer }
        logged_at: { type: string, format: date-time }

    DayLog:
      type: object
      description: One diary entry per (user, date). Synced last-write-wins by updated_at.
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        date: { type: string, format: date }
        mood: { type: integer, nullable: true, minimum: 1, maximum: 5 }
        note: { type: string, nullable: true }
        insight: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    FoodProduct:
      type: object
      description: A product from Open Food Facts; nutrition is per 100 g (null if unknown).
      properties:
        code: { type: string }
        name: { type: string }
        brand: { type: string, nullable: true }
        per_100g:
          type: object
          properties:
            calories: { type: number, nullable: true }
            protein: { type: number, nullable: true }
            fat: { type: number, nullable: true }
            carbs: { type: number, nullable: true }
            sugar: { type: number, nullable: true }
            fiber: { type: number, nullable: true }

    FoodLog:
      type: object
      description: >
        A logged food portion (append-only, like WaterLog). Nutrition values are
        absolute for the portion, precomputed by the client from the food DB
        (never by the model). Synced create-if-absent by id; createdAt is the
        "changed since" marker.
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        date: { type: string, format: date }
        meal: { type: string, enum: [breakfast, lunch, dinner, snack] }
        name: { type: string }
        grams: { type: number }
        calories: { type: number, nullable: true }
        protein: { type: number, nullable: true }
        fat: { type: number, nullable: true }
        carbs: { type: number, nullable: true }
        sugar: { type: number, nullable: true }
        fiber: { type: number, nullable: true }
        created_at: { type: string, format: date-time }

    SyncRequest:
      type: object
      required: [items, last_sync_at]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Item' }
        water_logs:
          type: array
          description: Optional. Water intake events created since last_sync_at.
          items: { $ref: '#/components/schemas/WaterLog' }
        food_logs:
          type: array
          description: Optional. Food logs created since last_sync_at (append-only).
          items: { $ref: '#/components/schemas/FoodLog' }
        day_logs:
          type: array
          description: Optional. Diary entries changed since last_sync_at (LWW by updated_at; keyed by date).
          items: { $ref: '#/components/schemas/DayLog' }
        deleted_item_ids:
          type: array
          description: Optional. Item ids deleted locally; the server deletes them (owner only).
          items: { type: string, format: uuid }
        streak:
          type: object
          description: "Optional. Client-side freeze state for LWW merge (ADR-044). Server applies if last_freeze_accrual_at is newer than server cursor."
          properties:
            freeze_count: { type: integer, minimum: 0 }
            last_freeze_accrual_at: { type: string, format: date-time, nullable: true }
          required: [freeze_count, last_freeze_accrual_at]
        last_sync_at: { type: string, format: date-time }

    SyncResponse:
      type: object
      properties:
        updated_items:
          type: array
          items: { $ref: '#/components/schemas/Item' }
        updated_water_logs:
          type: array
          description: Water logs changed on the server since last_sync_at.
          items: { $ref: '#/components/schemas/WaterLog' }
        updated_food_logs:
          type: array
          description: Food logs created on the server since last_sync_at.
          items: { $ref: '#/components/schemas/FoodLog' }
        updated_day_logs:
          type: array
          description: Diary entries changed on the server since last_sync_at.
          items: { $ref: '#/components/schemas/DayLog' }
        deleted_item_ids:
          type: array
          description: Item ids deleted on other devices since last_sync_at (apply locally).
          items: { type: string, format: uuid }
        streak:
          nullable: true
          description: "Current streak state after sync (freeze_count + last_freeze_accrual_at included). Null if user has no streak record yet."
          allOf:
            - $ref: '#/components/schemas/Streak'

    ShareResponse:
      type: object
      description: >
        Public view of a user's plan for a given date range.
        Omits id and user_id; contains only safe public fields.
      properties:
        owner_name: { type: string }
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        items:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              type: { type: string, enum: [task, event, exam, deadline] }
              scheduled_at: { type: string, format: date-time }
              duration_minutes: { type: integer }
              status: { type: string, enum: [pending, done, skipped] }

    RedistributeResponse:
      type: object
      properties:
        proposed:
          type: array
          items: { $ref: '#/components/schemas/Item' }
        skipped:
          type: array
          items: { $ref: '#/components/schemas/Item' }
